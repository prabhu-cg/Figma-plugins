<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 960"
  font-family="Inter, system-ui, -apple-system, sans-serif">

  <defs>

    <!-- Background gradient: warm dark -->
    <linearGradient id="bg" x1="0" y1="0" x2="1920" y2="960" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#1A1A2A"/>
    </linearGradient>

    <!-- Orange radial glow (left side, behind icon) -->
    <radialGradient id="glow" cx="420" cy="468" r="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#EE661D" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#EE661D" stop-opacity="0"/>
    </radialGradient>

    <!-- Bar gradients: warm amber → orange → coral → rose (one flowing system) -->
    <linearGradient id="bar-global" x1="60" y1="0" x2="780" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#EE661D"/>
    </linearGradient>

    <linearGradient id="bar-alias" x1="270" y1="0" x2="570" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#EE661D"/>
      <stop offset="100%" stop-color="#F43F5E"/>
    </linearGradient>

    <linearGradient id="bar-component" x1="270" y1="0" x2="570" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#F43F5E"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>

    <!-- Bottom accent bar gradient -->
    <linearGradient id="accent-bar" x1="0" y1="0" x2="1920" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FBBF24"/>
      <stop offset="40%"  stop-color="#EE661D"/>
      <stop offset="70%"  stop-color="#F43F5E"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>

  </defs>


  <!-- ─── Background ─── -->
  <rect width="1920" height="960" fill="url(#bg)"/>

  <!-- Warm glow cloud left-center -->
  <ellipse cx="420" cy="468" rx="440" ry="370" fill="url(#glow)"/>

  <!-- Subtle concentric rings (depth) -->
  <circle cx="420" cy="468" r="310" fill="none" stroke="#EE661D" stroke-opacity="0.05" stroke-width="1"/>
  <circle cx="420" cy="468" r="440" fill="none" stroke="#EE661D" stroke-opacity="0.03" stroke-width="1"/>


  <!-- ─── LEFT: T-icon (stacked layers) ─── -->

  <!-- 01 Global — wide crossbar, amber → orange -->
  <rect x="60" y="258" width="720" height="126" rx="20" fill="url(#bar-global)"/>
  <!-- Label inside bar -->
  <text x="108" y="336" fill="white" fill-opacity="0.92" font-weight="700" font-size="30"
    letter-spacing="0.5">01 · Global</text>

  <!-- Connector: Global → Alias -->
  <rect x="417" y="384" width="6" height="56" rx="3" fill="white" fill-opacity="0.12"/>

  <!-- 02 Alias — narrower stem, orange → coral -->
  <rect x="270" y="440" width="300" height="100" rx="16" fill="url(#bar-alias)"/>
  <text x="308" y="500" fill="white" fill-opacity="0.92" font-weight="700" font-size="26"
    letter-spacing="0.5">02 · Alias</text>

  <!-- Connector: Alias → Component -->
  <rect x="417" y="540" width="6" height="52" rx="3" fill="white" fill-opacity="0.12"/>

  <!-- 03 Component — narrower stem, coral → purple -->
  <rect x="270" y="592" width="300" height="100" rx="16" fill="url(#bar-component)"/>
  <text x="284" y="650" fill="white" fill-opacity="0.88" font-weight="700" font-size="22"
    letter-spacing="0.5">03 · Component</text>

  <!-- Subtle "Figma Variables" watermark below icon -->
  <text x="420" y="748" fill="white" fill-opacity="0.18" font-size="17" text-anchor="middle"
    font-weight="500" letter-spacing="4">FIGMA VARIABLES</text>


  <!-- ─── Vertical divider ─── -->
  <line x1="860" y1="80" x2="860" y2="880"
    stroke="white" stroke-opacity="0.05" stroke-width="1.5"/>


  <!-- ─── RIGHT: Text content ─── -->

  <!-- FREE badge -->
  <rect x="960" y="148" width="148" height="54" rx="13" fill="#22C55E"/>
  <text x="1034" y="184" fill="white" font-weight="800" font-size="26"
    text-anchor="middle" letter-spacing="1">FREE</text>

  <!-- FREE sub-label -->
  <text x="1126" y="183" fill="#4ADE80" font-size="20" font-weight="500">
    100% · No account · No limits
  </text>

  <!-- Main headline -->
  <text x="960" y="402" fill="white"       font-weight="800" font-size="102" letter-spacing="-2">Token System</text>
  <text x="960" y="516" fill="#EE661D"     font-weight="800" font-size="102" letter-spacing="-2">Generator Pro</text>

  <!-- Tagline -->
  <text x="960" y="584" fill="#94A3B8" font-size="27" font-weight="400">
    Build 2-tier &amp; 3-tier design token systems in seconds — not hours.
  </text>

  <!-- ─── Feature chips ─── -->

  <!-- 2 Tier -->
  <rect x="960"  y="626" width="136" height="50" rx="25"
    fill="#EE661D" fill-opacity="0.1" stroke="#EE661D" stroke-opacity="0.45" stroke-width="1.5"/>
  <text x="1028" y="658" fill="#EE661D" font-size="20" font-weight="600" text-anchor="middle">2 Tier</text>

  <!-- 3 Tier -->
  <rect x="1110" y="626" width="136" height="50" rx="25"
    fill="#EE661D" fill-opacity="0.1" stroke="#EE661D" stroke-opacity="0.45" stroke-width="1.5"/>
  <text x="1178" y="658" fill="#EE661D" font-size="20" font-weight="600" text-anchor="middle">3 Tier</text>

  <!-- Starter System -->
  <rect x="1260" y="626" width="196" height="50" rx="25"
    fill="#FBBF24" fill-opacity="0.08" stroke="#FBBF24" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="1358" y="658" fill="#FBBF24" font-size="20" font-weight="600" text-anchor="middle">Starter System</text>

  <!-- Smart Convert -->
  <rect x="1470" y="626" width="240" height="50" rx="25"
    fill="#34D399" fill-opacity="0.08" stroke="#34D399" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="1590" y="658" fill="#34D399" font-size="20" font-weight="600" text-anchor="middle">Smart Convert</text>

  <!-- Colors + Typography tags (smaller, secondary row) -->
  <text x="960"  y="712" fill="#475569" font-size="18" font-weight="500">Colors  ·  Typography  ·  Spacing  ·  Border Radius  ·  Native Figma Variables API</text>


  <!-- ─── Bottom accent bar ─── -->
  <rect x="0" y="918" width="1920" height="42" fill="url(#accent-bar)" fill-opacity="0.5"/>

</svg>
